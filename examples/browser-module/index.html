<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>zeos-link browser module example</title>
  </head>
  <body>
    <h1>zeos-link browser module example</h1>
    <button id="login">Login</button>
    <pre id="out"></pre>

    <script type="module">
      import ZSession from "../../dist/zeos-link.js";

      const out = document.getElementById("out");
      const session = new ZSession();

      const chain = {
        chain_id: "REPLACE_WITH_CHAIN_ID",
        protocol_contract: "REPLACE_WITH_PROTOCOL_CONTRACT",
        vault_contract: "REPLACE_WITH_VAULT_CONTRACT",
        alias_authority: "REPLACE_WITH_ALIAS_AUTHORITY",
      };

      document.getElementById("login").onclick = async () => {
        try {
          const result = await session.login(chain, () => {
            out.textContent += "\nSocket closed";
          });

          if (!result) {
            out.textContent = "Login declined";
            return;
          }

          out.textContent = JSON.stringify({ result, handle: session.handle() }, null, 2);
        } catch (err) {
          out.textContent = err instanceof Error ? err.message : String(err);
        }
      };
    </script>
  </body>
</html>
